# stack.yaml — Template

# Copie este template para `.context/stack.yaml` e preencha os campos.
# Campos marcados com (obrigatório) devem ser preenchidos.
# Campos marcados com (opcional) podem ser removidos se não aplicáveis.
# Campos marcados com (se aplicável) dependem do tipo de projeto.

project:
  name: ""                              # (obrigatório) Nome do projeto
  type: ""                              # (obrigatório) fullstack | backend | frontend | monorepo
  description: ""                       # (obrigatório) Descrição breve do projeto

stack:
  frontend:                             # (se aplicável) Remover se projeto backend-only
    framework: ""                       # angular | react | vue | next | svelte
    version: ""                         # Versão do framework
    language: "typescript"              # typescript | javascript
    styling: ""                         # tailwind | css-modules | styled-components | sass | vanilla
    testing: ""                         # vitest | jest | cypress | playwright
    template_base: ""                   # (opcional) Caminho para pasta de templates UI de referência
    patterns: []                        # Ex: ["signals", "standalone-components", "onpush"] ou ["hooks", "server-components"]
    conventions:                        # (CRÍTICO) Naming conventions do frontend — agents usam como referência
      component: ""                     # Ex: "{domínio}-{entidade}.component.ts", "EntityComponent.tsx"
      service: ""                       # Ex: "{domínio}.service.ts", "useEntity.ts"
      model: ""                         # Ex: "{entidade}.model.ts", "entity.types.ts"
      store: ""                         # Ex: "{domínio}.store.ts", "useEntityStore.ts"
      page: ""                          # Ex: "{entidade}.page.ts", "EntityPage.tsx"
      folder_structure: |               # Estrutura de pastas do frontend
        # Preencher com a estrutura real do projeto
        # Exemplo Angular: src/app/domains/{domínio}/
        # Exemplo React:   src/features/{domínio}/

  backend:                              # (se aplicável) Remover se projeto frontend-only
    framework: ""                       # laravel | nestjs | express | fastapi | spring | rails | django
    version: ""                         # Versão do framework
    language: ""                        # php | typescript | python | java | ruby | go
    language_version: ""                # Ex: "8.3", "20", "3.12"
    database: ""                        # postgresql | mysql | mongodb | sqlite
    testing: ""                         # pest | phpunit | jest | pytest | junit | rspec
    patterns: []                        # Ex: ["ddd", "actions", "dto", "form-request"] ou ["mvc", "services"]
    conventions:                        # (CRÍTICO) Naming conventions do backend — agents usam como referência
      controller: ""                    # Ex: "{Entity}Controller", "{entity}_controller.py"
      service: ""                       # Ex: "Create{Entity}Action", "{Entity}Service"
      model: ""                         # Ex: "{Entity}", "{entity}.model"
      dto: ""                           # Ex: "{Entity}DTO", "{entity}.dto"
      validation: ""                    # Ex: "{Entity}StoreRequest", "{entity}.validator"
      test: ""                          # Ex: "{Entity}Test", "{entity}.spec"
      folder_structure: |               # Estrutura de pastas do backend
        # Preencher com a estrutura real do projeto
        # Exemplo DDD:
        #   src/Domain/{Domínio}/Actions/
        #   src/Domain/{Domínio}/Models/
        # Exemplo MVC:
        #   app/Controllers/
        #   app/Models/

  gateway:                              # (opcional) Gateway/middleware separado
    framework: ""                       # nestjs | express | kong
    language: ""                        # typescript | go
    testing: ""                         # jest | vitest

  infrastructure:
    database: ""                        # (obrigatório) postgresql | mysql | mongodb
    cache: ""                           # (opcional) redis | memcached
    queue: ""                           # (opcional) redis-streams | rabbitmq | sqs | bullmq
    storage: ""                         # (opcional) local | s3 | gcs

architecture:
  pattern: ""                           # (obrigatório) ddd | mvc | hexagonal | clean | cqrs | monolithic
  multi_tenant: false                   # (obrigatório) true | false
  tenant_column: "tenant_id"            # (se multi_tenant) Nome da coluna de tenant
  domains: []                           # (obrigatório) Ex: ["auth", "crm", "chat", "billing"]

conventions:
  language:
    responses: "pt-br"                  # Idioma das respostas da IA
    code: "en"                          # Idioma do código (SEMPRE en)
    docs: "en"                          # Idioma da documentação
  commit: "conventional"                # conventional | angular | none
  branching: "gitflow"                  # gitflow | trunk-based | github-flow

code_rules:
  docs:                                 # Padrão de documentação inline por linguagem
    php: "phpDoc"                       # (se PHP) phpDoc obrigatório
    typescript: "jsDoc"                 # (se TS) jsDoc obrigatório
    python: "docstrings"                # (se Python) docstrings obrigatórias
    java: "javadoc"                     # (se Java) javadoc obrigatório
  typing:
    strict: true                        # (obrigatório) Tipagem strict
    ban: []                             # Tipos proibidos. Ex TS: ["any", "unknown"]. Ex PHP: ["mixed"]
    strict_types: true                  # (se PHP) declare(strict_types=1)
  testing:
    mandatory: true                     # (obrigatório) Todo código testado
    coverage_min: 80                    # (obrigatório) Cobertura mínima %
    skip_banned: true                   # Proibir testes skipped
    frameworks:                         # Frameworks de teste por camada
      backend: ""                       # pest | phpunit | jest | pytest | rspec
      frontend: ""                      # vitest | jest | cypress | playwright
      gateway: ""                       # jest | vitest
  security:
    tenant_isolation: false             # Se multi-tenant: verificar tenant em queries
    fillable_explicit: true             # (se ORM) NUNCA usar $guarded = [] ou equivalente
    no_log_secrets: true                # NUNCA logar tokens/senhas

quality:
  gates:
    backend: ""                         # Ex: "composer gate:all" ou "npm run lint && npm test"
    frontend: ""                        # Ex: "npm run gate:all" ou "npm run lint && npm test"
    gateway: ""                         # Ex: "pnpm lint && pnpm test && pnpm build"

